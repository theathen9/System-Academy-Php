version: "3.9"

services:
  app:
    image: php:8.3-apache
    container_name: my_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html

  mysql:
    image: mysql:8
    container_name: my_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: